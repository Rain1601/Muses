name: CI/CD — Test & Deploy to Google Cloud Run

# push to main
#     │
#     ▼
# ┌─────────────────┐
# │ test-backend     │  ← pip install + pytest (SQLite, 无外部依赖)
# └────────┬────────┘
#          │ pass
#          ▼
# ┌─────────────────┐
# │ deploy-backend   │  ← Docker build → Artifact Registry → Cloud Run
# └────────┬────────┘
#          │ 拿到 backend URL
#          ▼
# ┌─────────────────┐
# │ deploy-frontend  │  ← Docker build (注入 NEXT_PUBLIC_API_URL) → Artifact Registry → Cloud Run
# └─────────────────┘

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION || 'asia-east1' }}
  AR_REPO: muses
  BACKEND_SERVICE: muses-backend
  FRONTEND_SERVICE: muses-frontend

jobs:
  # ==================== 1. Test Backend ====================
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend-python

    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend-python/requirements.txt

    - name: Install dependencies
      run: pip install -r requirements.txt

    - name: Run tests (SQLite, offline)
      env:
        DATABASE_URL: "sqlite:///./test.db"
        GITHUB_CLIENT_ID: "test"
        GITHUB_CLIENT_SECRET: "test"
        JWT_SECRET: "test-secret-key-for-ci"
        ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef"
        ENCRYPTION_SALT: "test_salt"
        ENVIRONMENT: "test"
      run: |
        python -m pytest \
          test_prompt_system.py \
          test_instruction_merge.py \
          test_default_instructions.py \
          test_action_system.py \
          -x --tb=short -q

  # ==================== 2. Deploy Backend ====================
  deploy-backend:
    needs: test-backend
    runs-on: ubuntu-latest
    outputs:
      backend_url: ${{ steps.url.outputs.url }}

    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

    - name: Ensure Artifact Registry repo exists
      run: |
        gcloud artifacts repositories describe $AR_REPO \
          --location=$REGION --project=$PROJECT_ID 2>/dev/null || \
        gcloud artifacts repositories create $AR_REPO \
          --repository-format=docker \
          --location=$REGION --project=$PROJECT_ID \
          --description="Muses container images"

    - name: Build & push backend image
      run: |
        IMAGE=${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${BACKEND_SERVICE}
        docker build -t ${IMAGE}:${{ github.sha }} -t ${IMAGE}:latest backend-python/
        docker push ${IMAGE}:${{ github.sha }}
        docker push ${IMAGE}:latest

    - name: Deploy to Cloud Run
      env:
        CLOUD_SQL: ${{ secrets.CLOUD_SQL_INSTANCE }}
        DB_URL: ${{ secrets.DATABASE_URL }}
        GH_CID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
        GH_CSC: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
        JWT_S: ${{ secrets.JWT_SECRET }}
        ENC_K: ${{ secrets.ENCRYPTION_KEY }}
        ENC_S: ${{ secrets.ENCRYPTION_SALT }}
        OAI_K: ${{ secrets.OPENAI_API_KEY }}
        AHM_K: ${{ secrets.AIHUBMIX_API_KEY }}
        G_CID: ${{ secrets.GOOGLE_CLIENT_ID }}
        G_CSC: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      run: |
        IMAGE=${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${BACKEND_SERVICE}

        ENV_VARS="ENVIRONMENT=production"
        ENV_VARS="${ENV_VARS},DEBUG=False"
        ENV_VARS="${ENV_VARS},HOST=0.0.0.0"
        ENV_VARS="${ENV_VARS},DATABASE_URL=${DB_URL}"
        ENV_VARS="${ENV_VARS},GITHUB_CLIENT_ID=${GH_CID}"
        ENV_VARS="${ENV_VARS},GITHUB_CLIENT_SECRET=${GH_CSC}"
        ENV_VARS="${ENV_VARS},JWT_SECRET=${JWT_S}"
        ENV_VARS="${ENV_VARS},ENCRYPTION_KEY=${ENC_K}"
        ENV_VARS="${ENV_VARS},ENCRYPTION_SALT=${ENC_S}"
        ENV_VARS="${ENV_VARS},OPENAI_API_KEY=${OAI_K}"
        ENV_VARS="${ENV_VARS},AIHUBMIX_API_KEY=${AHM_K}"
        ENV_VARS="${ENV_VARS},AIHUBMIX_BASE_URL=https://aihubmix.com/v1"
        ENV_VARS="${ENV_VARS},GOOGLE_CLIENT_ID=${G_CID}"
        ENV_VARS="${ENV_VARS},GOOGLE_CLIENT_SECRET=${G_CSC}"
        ENV_VARS="${ENV_VARS},ENABLE_STUDIO=false"
        ENV_VARS="${ENV_VARS},LOG_LEVEL=INFO"

        gcloud run deploy $BACKEND_SERVICE \
          --image ${IMAGE}:${{ github.sha }} \
          --region $REGION \
          --project $PROJECT_ID \
          --allow-unauthenticated \
          --add-cloudsql-instances "${CLOUD_SQL}" \
          --memory 1Gi --cpu 1 \
          --min-instances 0 --max-instances 3 \
          --set-env-vars "${ENV_VARS}" \
          --quiet

    - name: Get backend URL & self-update
      id: url
      run: |
        URL=$(gcloud run services describe $BACKEND_SERVICE \
          --region $REGION --project $PROJECT_ID \
          --format "value(status.url)")
        echo "url=$URL" >> "$GITHUB_OUTPUT"
        echo "Backend: $URL"

        # 回填 BACKEND_URL（OAuth redirect 用）
        gcloud run services update $BACKEND_SERVICE \
          --region $REGION --project $PROJECT_ID \
          --update-env-vars "BACKEND_URL=$URL" --quiet

    - name: Health check
      run: |
        URL="${{ steps.url.outputs.url }}"
        for i in 1 2 3 4 5; do
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$URL/api/health" || true)
          if [ "$STATUS" = "200" ]; then
            echo "Backend healthy!"
            exit 0
          fi
          echo "Attempt $i: status=$STATUS, retrying..."
          sleep 5
        done
        echo "Backend health check failed"
        exit 1

  # ==================== 3. Deploy Frontend ====================
  deploy-frontend:
    needs: deploy-backend
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker for Artifact Registry
      run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

    - name: Build & push frontend image
      run: |
        IMAGE=${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${FRONTEND_SERVICE}
        docker build \
          --build-arg NEXT_PUBLIC_API_URL=${{ needs.deploy-backend.outputs.backend_url }} \
          -t ${IMAGE}:${{ github.sha }} \
          -t ${IMAGE}:latest \
          frontend/
        docker push ${IMAGE}:${{ github.sha }}
        docker push ${IMAGE}:latest

    - name: Deploy to Cloud Run
      run: |
        IMAGE=${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${FRONTEND_SERVICE}
        BACKEND_URL=${{ needs.deploy-backend.outputs.backend_url }}

        gcloud run deploy $FRONTEND_SERVICE \
          --image ${IMAGE}:${{ github.sha }} \
          --region $REGION \
          --project $PROJECT_ID \
          --allow-unauthenticated \
          --memory 256Mi --cpu 1 \
          --min-instances 0 --max-instances 3 \
          --set-env-vars "BACKEND_INTERNAL_URL=${BACKEND_URL}" \
          --quiet

    - name: Update backend CORS & print URLs
      run: |
        FRONTEND_URL=$(gcloud run services describe $FRONTEND_SERVICE \
          --region $REGION --project $PROJECT_ID \
          --format "value(status.url)")

        gcloud run services update $BACKEND_SERVICE \
          --region $REGION --project $PROJECT_ID \
          --update-env-vars "FRONTEND_URL=$FRONTEND_URL" --quiet

        echo "============================================="
        echo "  Deploy Complete"
        echo "  Frontend: $FRONTEND_URL"
        echo "  Backend:  ${{ needs.deploy-backend.outputs.backend_url }}"
        echo "============================================="
