name: CI/CD — Test & Deploy to Google Cloud Run

# push to main
#     │
#     ▼
# ┌─────────────────┐
# │  detect-changes  │  ← 检测哪些服务有改动
# └────────┬────────┘
#    ┌─────┴─────┐
#    ▼           ▼
# ┌──────┐  ┌──────┐
# │ back │  │front │  ← 并行：test + build + deploy（仅改动的服务）
# └──┬───┘  └──┬───┘
#    └─────┬───┘
#          ▼
# ┌─────────────────┐
# │  post-deploy     │  ← 更新 CORS / env
# └─────────────────┘

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: ${{ vars.GCP_REGION || 'asia-east1' }}
  AR_REPO: muses
  BACKEND_SERVICE: muses-backend
  FRONTEND_SERVICE: muses-frontend

jobs:
  # ==================== 0. Detect Changes ====================
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 2

    - id: filter
      run: |
        # Compare with previous commit
        CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "ALL")
        echo "Changed files: $CHANGED"

        if echo "$CHANGED" | grep -q "ALL\|\.github/workflows"; then
          echo "backend=true" >> "$GITHUB_OUTPUT"
          echo "frontend=true" >> "$GITHUB_OUTPUT"
        else
          if echo "$CHANGED" | grep -q "^backend-python/"; then
            echo "backend=true" >> "$GITHUB_OUTPUT"
          else
            echo "backend=false" >> "$GITHUB_OUTPUT"
          fi
          if echo "$CHANGED" | grep -q "^frontend/"; then
            echo "frontend=true" >> "$GITHUB_OUTPUT"
          else
            echo "frontend=false" >> "$GITHUB_OUTPUT"
          fi
        fi

  # ==================== 1. Deploy Backend ====================
  deploy-backend:
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v4

    # --- Test ---
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        cache-dependency-path: backend-python/requirements.txt

    - name: Install & test
      working-directory: backend-python
      env:
        DATABASE_URL: "sqlite:///./test.db"
        GITHUB_CLIENT_ID: "test"
        GITHUB_CLIENT_SECRET: "test"
        JWT_SECRET: "test-secret-key-for-ci"
        ENCRYPTION_KEY: "0123456789abcdef0123456789abcdef"
        ENCRYPTION_SALT: "test_salt"
        ENVIRONMENT: "test"
      run: |
        pip install -r requirements.txt
        python -m pytest \
          test_prompt_system.py \
          test_instruction_merge.py \
          test_default_instructions.py \
          test_action_system.py \
          -x --tb=short -q

    # --- Build & Deploy ---
    - id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker
      run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

    - name: Build & push (with cache)
      run: |
        IMAGE=${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${BACKEND_SERVICE}
        docker build \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          --cache-from ${IMAGE}:latest \
          -t ${IMAGE}:${{ github.sha }} \
          -t ${IMAGE}:latest \
          backend-python/
        docker push ${IMAGE}:${{ github.sha }}
        docker push ${IMAGE}:latest
      env:
        DOCKER_BUILDKIT: 1

    - name: Deploy to Cloud Run
      env:
        CLOUD_SQL: ${{ secrets.CLOUD_SQL_INSTANCE }}
        DB_URL: ${{ secrets.DATABASE_URL }}
        GH_CID: ${{ secrets.OAUTH_GITHUB_CLIENT_ID }}
        GH_CSC: ${{ secrets.OAUTH_GITHUB_CLIENT_SECRET }}
        JWT_S: ${{ secrets.JWT_SECRET }}
        ENC_K: ${{ secrets.ENCRYPTION_KEY }}
        ENC_S: ${{ secrets.ENCRYPTION_SALT }}
        OAI_K: ${{ secrets.OPENAI_API_KEY }}
        AHM_K: ${{ secrets.AIHUBMIX_API_KEY }}
        G_CID: ${{ secrets.GOOGLE_CLIENT_ID }}
        G_CSC: ${{ secrets.GOOGLE_CLIENT_SECRET }}
      run: |
        IMAGE=${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${BACKEND_SERVICE}

        ENV_VARS="ENVIRONMENT=production"
        ENV_VARS="${ENV_VARS},DEBUG=False"
        ENV_VARS="${ENV_VARS},HOST=0.0.0.0"
        ENV_VARS="${ENV_VARS},DATABASE_URL=${DB_URL}"
        ENV_VARS="${ENV_VARS},GITHUB_CLIENT_ID=${GH_CID}"
        ENV_VARS="${ENV_VARS},GITHUB_CLIENT_SECRET=${GH_CSC}"
        ENV_VARS="${ENV_VARS},JWT_SECRET=${JWT_S}"
        ENV_VARS="${ENV_VARS},ENCRYPTION_KEY=${ENC_K}"
        ENV_VARS="${ENV_VARS},ENCRYPTION_SALT=${ENC_S}"
        ENV_VARS="${ENV_VARS},OPENAI_API_KEY=${OAI_K}"
        ENV_VARS="${ENV_VARS},AIHUBMIX_API_KEY=${AHM_K}"
        ENV_VARS="${ENV_VARS},AIHUBMIX_BASE_URL=https://aihubmix.com/v1"
        ENV_VARS="${ENV_VARS},GOOGLE_CLIENT_ID=${G_CID}"
        ENV_VARS="${ENV_VARS},GOOGLE_CLIENT_SECRET=${G_CSC}"
        ENV_VARS="${ENV_VARS},ENABLE_STUDIO=false"
        ENV_VARS="${ENV_VARS},LOG_LEVEL=INFO"

        gcloud run deploy $BACKEND_SERVICE \
          --image ${IMAGE}:${{ github.sha }} \
          --region $REGION \
          --project $PROJECT_ID \
          --allow-unauthenticated \
          --add-cloudsql-instances "${CLOUD_SQL}" \
          --memory 2Gi --cpu 1 \
          --min-instances 0 --max-instances 3 \
          --timeout 300 \
          --set-env-vars "${ENV_VARS}" \
          --quiet

    - name: Self-update backend URL
      run: |
        URL=$(gcloud run services describe $BACKEND_SERVICE \
          --region $REGION --project $PROJECT_ID \
          --format "value(status.url)")
        echo "Backend: $URL"
        gcloud run services update $BACKEND_SERVICE \
          --region $REGION --project $PROJECT_ID \
          --update-env-vars "BACKEND_URL=$URL" --quiet

  # ==================== 2. Deploy Frontend (parallel) ====================
  deploy-frontend:
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker
      run: gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

    - name: Get backend URL
      id: backend
      run: |
        URL=$(gcloud run services describe $BACKEND_SERVICE \
          --region $REGION --project $PROJECT_ID \
          --format "value(status.url)")
        echo "url=$URL" >> "$GITHUB_OUTPUT"
        echo "Backend URL: $URL"

    - name: Build & push (with cache)
      run: |
        IMAGE=${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${FRONTEND_SERVICE}
        docker build \
          --build-arg BUILDKIT_INLINE_CACHE=1 \
          --build-arg NEXT_PUBLIC_API_URL=${{ steps.backend.outputs.url }} \
          --cache-from ${IMAGE}:latest \
          -t ${IMAGE}:${{ github.sha }} \
          -t ${IMAGE}:latest \
          frontend/
        docker push ${IMAGE}:${{ github.sha }}
        docker push ${IMAGE}:latest
      env:
        DOCKER_BUILDKIT: 1

    - name: Deploy to Cloud Run
      run: |
        IMAGE=${REGION}-docker.pkg.dev/${PROJECT_ID}/${AR_REPO}/${FRONTEND_SERVICE}

        gcloud run deploy $FRONTEND_SERVICE \
          --image ${IMAGE}:${{ github.sha }} \
          --region $REGION \
          --project $PROJECT_ID \
          --allow-unauthenticated \
          --memory 256Mi --cpu 1 \
          --min-instances 0 --max-instances 3 \
          --set-env-vars "BACKEND_INTERNAL_URL=${{ steps.backend.outputs.url }}" \
          --quiet

  # ==================== 3. Post-deploy: update CORS ====================
  post-deploy:
    needs: [deploy-backend, deploy-frontend]
    if: always() && (needs.deploy-backend.result == 'success' || needs.deploy-frontend.result == 'success')
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
    - uses: actions/checkout@v4

    - id: auth
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - uses: google-github-actions/setup-gcloud@v2

    - name: Update CORS & print URLs
      run: |
        BACKEND_URL=$(gcloud run services describe $BACKEND_SERVICE \
          --region $REGION --project $PROJECT_ID \
          --format "value(status.url)")
        FRONTEND_URL=$(gcloud run services describe $FRONTEND_SERVICE \
          --region $REGION --project $PROJECT_ID \
          --format "value(status.url)")

        gcloud run services update $BACKEND_SERVICE \
          --region $REGION --project $PROJECT_ID \
          --update-env-vars "FRONTEND_URL=$FRONTEND_URL" --quiet

        echo "============================================="
        echo "  Deploy Complete"
        echo "  Frontend: $FRONTEND_URL"
        echo "  Backend:  $BACKEND_URL"
        echo "============================================="
